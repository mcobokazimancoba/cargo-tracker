<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reset Password</title>
  <link rel="stylesheet" href="/Cargo_Tracker_System/css/styles.css">
</head>
<body>
  <div class="container">
    <h2>Reset Your Password</h2>
    <div id="reset-alert"></div>
    <form id="reset-form">
      <input type="password" id="newPassword" 
             placeholder="New password (min 8 characters)" required>
      <input type="password" id="confirmPassword" 
             placeholder="Confirm new password" required>
      <button type="submit">Reset Password</button>
    </form>
  </div>
  <script type="module" 
          src="/Cargo_Tracker_System/js/reset-password.js"></script>
</body>
</html>
