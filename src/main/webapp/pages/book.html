<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Shipment — Cargo Tracker</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        /* ── Searchable location combobox ────────────────────────────────── */
        .combobox { position: relative; }
        .combobox-input { width: 100%; cursor: text; }
        .combobox-input.has-selection {
            background: rgba(245,158,11,0.06);
            border-color: rgba(245,158,11,0.3);
        }
        .combobox-clear {
            position: absolute; top: 50%; right: 12px; transform: translateY(-50%);
            background: none; border: none; cursor: pointer;
            color: var(--text-muted); font-size: 1rem; padding: 4px 8px;
            display: none; transition: color 0.15s;
        }
        .combobox-clear:hover { color: var(--red); }
        .combobox-input.has-selection ~ .combobox-clear { display: block; }

        .combobox-list {
            position: absolute; top: calc(100% + 4px); left: 0; right: 0;
            background: var(--bg-raised);
            border: 1px solid var(--border-strong);
            border-radius: var(--radius-sm);
            max-height: 280px; overflow-y: auto;
            z-index: 100; display: none;
            box-shadow: 0 12px 40px rgba(0,0,0,0.4);
        }
        .combobox-list.open { display: block; }
        .combobox-option {
            padding: 10px 14px; cursor: pointer;
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            gap: 12px;
            transition: background 0.12s;
        }
        .combobox-option:last-child { border-bottom: none; }
        .combobox-option:hover, .combobox-option.highlighted {
            background: rgba(245,158,11,0.08);
        }
        .combobox-option-main {
            font-size: 0.88rem; color: var(--text-primary);
            display: flex; flex-direction: column;
        }
        .combobox-option-city { font-weight: 500; }
        .combobox-option-country {
            font-size: 0.7rem; color: var(--text-muted); margin-top: 2px;
        }
        .combobox-option-code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem; color: var(--amber);
            letter-spacing: 0.08em;
            padding: 3px 8px;
            background: rgba(245,158,11,0.1);
            border: 1px solid rgba(245,158,11,0.25);
            border-radius: 3px;
            flex-shrink: 0;
        }
        .combobox-empty {
            padding: 18px 14px; text-align: center;
            font-size: 0.78rem; color: var(--text-muted);
            font-style: italic;
        }

        /* highlight matched substring inside the city name */
        .match { color: var(--amber); font-weight: 600; }

        /* ── Route preview ──────────────────────────────────────────────── */
        .route-preview {
            background: var(--bg-raised);
            border: 1px solid rgba(245,158,11,0.25);
            border-radius: var(--radius-md);
            padding: 18px 20px;
            margin: 24px 0;
            display: none;
        }
        .route-preview.visible { display: block; animation: route-in 0.4s ease-out; }
        @keyframes route-in {
            from { opacity: 0; transform: translateY(-6px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .route-preview-label {
            font-size: 0.6rem; letter-spacing: 0.14em;
            text-transform: uppercase; color: var(--text-muted);
            margin-bottom: 14px;
        }
        .route-line {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            gap: 16px;
        }
        .route-port { display: flex; flex-direction: column; gap: 4px; }
        .route-port.dest { text-align: right; }
        .route-port-city {
            font-size: 1.05rem; font-weight: 600; color: var(--text-primary);
        }
        .route-port-country {
            font-size: 0.78rem; color: var(--text-secondary);
        }
        .route-port-code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem; letter-spacing: 0.1em;
            color: var(--amber); margin-top: 2px;
        }
        .route-arrow-big {
            color: var(--amber); font-size: 1.4rem;
            position: relative; padding: 0 4px;
        }
        .route-arrow-big::before {
            content: ''; position: absolute; top: 50%; left: -8px; right: -8px;
            height: 1px; background: linear-gradient(90deg, transparent, var(--amber), transparent);
            transform: translateY(-50%);
        }

        /* slimmer hint about selecting from real ports */
        .field-help {
            font-size: 0.7rem; color: var(--text-muted);
            margin-top: 5px; letter-spacing: 0.04em;
        }
        .field-help.error { color: var(--red); }

        /* form layout tweaks */
        .booking-row {
            display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
        }
        @media (max-width: 720px) {
            .booking-row { grid-template-columns: 1fr; }
            .route-line { grid-template-columns: 1fr; gap: 8px; }
            .route-port.dest { text-align: left; }
            .route-arrow-big { transform: rotate(90deg); }
            .route-arrow-big::before { display: none; }
        }
    </style>
</head>
<body>
<nav class="nav">
    <div class="nav-logo"><div class="nav-logo-hex"></div>CargoTrack</div>
    <div class="nav-links">
        <a class="nav-link" data-page="dashboard" href="dashboard.html">Dashboard</a>
        <a class="nav-link" data-page="book"      href="book.html">Book Shipment</a>
        <a class="nav-link" data-page="track"     href="track.html">Track</a>
        <a class="nav-link" data-page="search"    href="search.html">All Cargo</a>
        <a class="nav-link" data-page="update"    href="update-cargo.html">Update</a>
    </div>
    <div class="nav-actions">
        <span id="nav-user" class="nav-user-badge" style="display:none"></span>
        <button id="btn-logout" class="btn btn-ghost btn-sm">Sign Out</button>
    </div>
</nav>

<main class="page">
    <div class="page-title">Book Shipment</div>
    <div class="page-subtitle">Pick the origin and destination ports — a confirmation email will be sent to your address.</div>

    <div id="alert-box"></div>

    <div class="card">
        <form id="booking-form">

            <div class="booking-row">
                <!-- ORIGIN -->
                <div class="form-group">
                    <label class="form-label" for="origin-input">Origin Port</label>
                    <div class="combobox" id="origin-combo">
                        <input id="origin-input" class="form-control combobox-input"
                               type="text" placeholder="Type a city or country…"
                               autocomplete="off" required>
                        <button type="button" class="combobox-clear" data-target="origin" aria-label="Clear origin">×</button>
                        <div class="combobox-list" id="origin-list" role="listbox"></div>
                    </div>
                    <input type="hidden" id="origin-code">
                    <div class="field-help" id="origin-help">Search by city, country, or UN/LOCODE.</div>
                </div>

                <!-- DESTINATION -->
                <div class="form-group">
                    <label class="form-label" for="destination-input">Destination Port</label>
                    <div class="combobox" id="destination-combo">
                        <input id="destination-input" class="form-control combobox-input"
                               type="text" placeholder="Type a city or country…"
                               autocomplete="off" required>
                        <button type="button" class="combobox-clear" data-target="destination" aria-label="Clear destination">×</button>
                        <div class="combobox-list" id="destination-list" role="listbox"></div>
                    </div>
                    <input type="hidden" id="destination-code">
                    <div class="field-help" id="destination-help">Search by city, country, or UN/LOCODE.</div>
                </div>
            </div>

            <!-- ROUTE PREVIEW -->
            <div id="route-preview" class="route-preview">
                <div class="route-preview-label">Route Preview</div>
                <div class="route-line">
                    <div class="route-port" id="preview-origin">
                        <div class="route-port-city"     id="preview-origin-city">—</div>
                        <div class="route-port-country"  id="preview-origin-country">—</div>
                        <div class="route-port-code"     id="preview-origin-code">—</div>
                    </div>
                    <div class="route-arrow-big">→</div>
                    <div class="route-port dest" id="preview-dest">
                        <div class="route-port-city"     id="preview-dest-city">—</div>
                        <div class="route-port-country"  id="preview-dest-country">—</div>
                        <div class="route-port-code"     id="preview-dest-code">—</div>
                    </div>
                </div>
            </div>

            <div class="booking-row">
                <!-- DESCRIPTION -->
                <div class="form-group">
                    <label class="form-label" for="description">Description</label>
                    <input id="description" class="form-control"
                           placeholder="e.g. Electronic components" required>
                </div>

                <!-- WEIGHT -->
                <div class="form-group">
                    <label class="form-label" for="weight">Weight (kg)</label>
                    <input id="weight" type="number" step="0.1" min="0.1" class="form-control"
                           placeholder="e.g. 250" required>
                </div>
            </div>

            <!-- ETA -->
            <div class="form-group">
                <label class="form-label" for="eta">Expected Arrival</label>
                <input id="eta" type="date" class="form-control">
            </div>

            <button type="submit" class="btn btn-primary btn-lg" style="width:100%">
                Confirm Booking
            </button>
        </form>
    </div>
</main>

<script type="module">
    import { Auth, CargoApi, LocationApi, initNav, showAlert } from '../js/api.js';

    Auth.requireAuth();
    initNav('book');

    /* ──────────────────────────────────────────────────────────────
       Searchable location combobox
       Backed by GET /api/locations — we cache the full list in
       memory the first time and filter client-side. With ~16 rows
       there's no point round-tripping to PostgreSQL on every keystroke.
       ────────────────────────────────────────────────────────────── */

    let LOCATIONS = [];                                   // populated on load
    const SELECTED = { origin: null, destination: null }; // { unlocode, city, country }

    /** Pull the list once on page load, plus a tiny shimmer if it lags. */
    async function loadLocations() {
        try {
            LOCATIONS = await LocationApi.list();
            // Sort alphabetically by city for a predictable dropdown order.
            LOCATIONS.sort((a, b) => a.city.localeCompare(b.city));
        } catch (err) {
            console.error('Failed to load locations:', err);
            showAlert('alert-box',
                'Could not load the port catalogue. Refresh the page or contact an admin.', 'error');
        }
    }

    /** Build a single dropdown <div> for one location, with optional substring highlighting. */
    function renderOption(loc, query) {
        const opt = document.createElement('div');
        opt.className = 'combobox-option';
        opt.dataset.unlocode = loc.unlocode;
        opt.setAttribute('role', 'option');

        const city    = highlight(loc.city, query);
        const country = highlight(loc.country, query);
        const code    = highlight(loc.unlocode, query);

        opt.innerHTML = `
            <div class="combobox-option-main">
                <span class="combobox-option-city">${city}</span>
                <span class="combobox-option-country">${country}</span>
            </div>
            <span class="combobox-option-code">${code}</span>
        `;
        return opt;
    }

    /** Highlight every case-insensitive occurrence of `query` inside `text`. */
    function highlight(text, query) {
        if (!query) return escapeHtml(text);
        const safe   = escapeHtml(text);
        const needle = escapeRegex(query);
        return safe.replace(new RegExp(`(${needle})`, 'ig'), '<span class="match">$1</span>');
    }
    function escapeHtml(s)  { return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
    function escapeRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

    /** Filter the cached list by user's free-text query (city OR country OR code substring). */
    function filterLocations(query) {
        if (!query) return LOCATIONS.slice(0, 20);
        const q = query.toLowerCase();
        return LOCATIONS.filter(loc =>
            loc.city.toLowerCase().includes(q)    ||
            loc.country.toLowerCase().includes(q) ||
            loc.unlocode.toLowerCase().includes(q)
        );
    }

    /** Wire up one combobox (origin or destination). All state lives in SELECTED[field]. */
    function setupCombobox(field) {
        const input = document.getElementById(`${field}-input`);
        const list  = document.getElementById(`${field}-list`);
        const codeHidden = document.getElementById(`${field}-code`);
        const help  = document.getElementById(`${field}-help`);

        let highlightedIdx = -1;

        function rebuild(query) {
            const matches = filterLocations(query);
            list.innerHTML = '';
            highlightedIdx = -1;

            if (!matches.length) {
                const empty = document.createElement('div');
                empty.className = 'combobox-empty';
                empty.textContent = `No ports match "${query}".`;
                list.appendChild(empty);
                return;
            }
            matches.forEach((loc, idx) => {
                const opt = renderOption(loc, query);
                opt.addEventListener('mousedown', e => {       // mousedown not click — fires before input.blur
                    e.preventDefault();
                    select(loc);
                });
                opt.addEventListener('mouseenter', () => {
                    list.querySelectorAll('.highlighted').forEach(el => el.classList.remove('highlighted'));
                    opt.classList.add('highlighted');
                    highlightedIdx = idx;
                });
                list.appendChild(opt);
            });
        }

        function open() {
            rebuild(input.value.trim());
            list.classList.add('open');
        }
        function close() { list.classList.remove('open'); }

        function select(loc) {
            SELECTED[field] = loc;
            input.value = `${loc.city}, ${loc.country}`;
            input.classList.add('has-selection');
            codeHidden.value = loc.unlocode;
            help.textContent = `Selected: ${loc.unlocode}`;
            help.classList.remove('error');
            close();
            updateRoutePreview();
            validateNotSameAsOther(field);
        }

        function clear() {
            SELECTED[field] = null;
            input.value = '';
            input.classList.remove('has-selection');
            codeHidden.value = '';
            help.textContent = 'Search by city, country, or UN/LOCODE.';
            help.classList.remove('error');
            updateRoutePreview();
            input.focus();
        }

        // Input events
        input.addEventListener('focus', open);
        input.addEventListener('input', () => {
            // Typing invalidates any prior selection
            SELECTED[field] = null;
            codeHidden.value = '';
            input.classList.remove('has-selection');
            help.textContent = 'Search by city, country, or UN/LOCODE.';
            help.classList.remove('error');
            rebuild(input.value.trim());
            list.classList.add('open');
            updateRoutePreview();
        });
        input.addEventListener('blur', () => setTimeout(close, 100));    // delay so click can land

        // Keyboard navigation
        input.addEventListener('keydown', e => {
            const opts = [...list.querySelectorAll('.combobox-option')];
            if (!opts.length) return;
            if (e.key === 'ArrowDown') {
                e.preventDefault();
                highlightedIdx = Math.min(opts.length - 1, highlightedIdx + 1);
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                highlightedIdx = Math.max(0, highlightedIdx - 1);
            } else if (e.key === 'Enter') {
                if (highlightedIdx >= 0 && opts[highlightedIdx]) {
                    e.preventDefault();
                    const code = opts[highlightedIdx].dataset.unlocode;
                    const loc = LOCATIONS.find(l => l.unlocode === code);
                    if (loc) select(loc);
                }
                return;
            } else if (e.key === 'Escape') {
                close();
                return;
            } else {
                return;
            }
            opts.forEach(o => o.classList.remove('highlighted'));
            opts[highlightedIdx]?.classList.add('highlighted');
            opts[highlightedIdx]?.scrollIntoView({ block: 'nearest' });
        });

        // Clear button
        document.querySelector(`.combobox-clear[data-target="${field}"]`)
                .addEventListener('click', clear);
    }

    /** Reject same-as-other selection inline, BEFORE submission, to spare the user a server round-trip. */
    function validateNotSameAsOther(justChanged) {
        const o = SELECTED.origin?.unlocode;
        const d = SELECTED.destination?.unlocode;
        if (o && d && o === d) {
            const help = document.getElementById(`${justChanged}-help`);
            help.textContent = '✗ Origin and destination cannot be the same port.';
            help.classList.add('error');
        }
    }

    function updateRoutePreview() {
        const preview = document.getElementById('route-preview');
        const o = SELECTED.origin;
        const d = SELECTED.destination;

        if (o && d) {
            document.getElementById('preview-origin-city').textContent    = o.city;
            document.getElementById('preview-origin-country').textContent = o.country;
            document.getElementById('preview-origin-code').textContent    = o.unlocode;
            document.getElementById('preview-dest-city').textContent      = d.city;
            document.getElementById('preview-dest-country').textContent   = d.country;
            document.getElementById('preview-dest-code').textContent      = d.unlocode;
            preview.classList.add('visible');
        } else {
            preview.classList.remove('visible');
        }
    }

    /* ── Bootstrap on page load ───────────────────────────────────────── */
    await loadLocations();
    setupCombobox('origin');
    setupCombobox('destination');

    /* ── Default the ETA picker to "tomorrow" — friendlier than blank ──── */
    const tomorrow = new Date(Date.now() + 24 * 3600 * 1000);
    document.getElementById('eta').value = tomorrow.toISOString().slice(0, 10);
    document.getElementById('eta').min   = tomorrow.toISOString().slice(0, 10);

    /* ── Form submission ──────────────────────────────────────────────── */
    document.getElementById('booking-form').addEventListener('submit', async (e) => {
        e.preventDefault();

        if (!SELECTED.origin || !SELECTED.destination) {
            showAlert('alert-box', 'Please pick both an origin and a destination port.', 'error');
            return;
        }
        if (SELECTED.origin.unlocode === SELECTED.destination.unlocode) {
            showAlert('alert-box', 'Origin and destination cannot be the same port.', 'error');
            return;
        }

        const btn = e.target.querySelector('button[type="submit"]');
        btn.disabled    = true;
        btn.textContent = 'Booking…';

        try {
            const result = await CargoApi.book({
                originUnlocode:      SELECTED.origin.unlocode,
                destinationUnlocode: SELECTED.destination.unlocode,
                description:         document.getElementById('description').value.trim(),
                weightKg:            parseFloat(document.getElementById('weight').value),
                expectedArrival:     document.getElementById('eta').value || null
            });

            const originLabel = `${SELECTED.origin.city}, ${SELECTED.origin.country}`;
            const destLabel   = `${SELECTED.destination.city}, ${SELECTED.destination.country}`;

            showAlert(
                'alert-box',
                `✓ Booking confirmed! Tracking: ${result.trackingNumber} — ` +
                `${originLabel} → ${destLabel}. A confirmation email has been sent to you.`,
                'success'
            );

            // Reset everything for a possible second booking
            document.getElementById('booking-form').reset();
            ['origin', 'destination'].forEach(f => {
                SELECTED[f] = null;
                document.getElementById(`${f}-input`).value = '';
                document.getElementById(`${f}-input`).classList.remove('has-selection');
                document.getElementById(`${f}-code`).value = '';
                document.getElementById(`${f}-help`).textContent = 'Search by city, country, or UN/LOCODE.';
                document.getElementById(`${f}-help`).classList.remove('error');
            });
            updateRoutePreview();
            // Restore the friendly default ETA again after reset() blanked it
            document.getElementById('eta').value = tomorrow.toISOString().slice(0, 10);
        } catch (err) {
            showAlert('alert-box', err.message || 'Booking failed. Please try again.', 'error');
        } finally {
            btn.disabled    = false;
            btn.textContent = 'Confirm Booking';
        }
    });
</script>
</body>
</html>
