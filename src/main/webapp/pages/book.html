<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Shipment — Cargo Tracker</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        /* ── Port-picker (select with internal search) ─────────────────── */

        .port-picker { position: relative; }

        /* Looks like a normal form control but is a button to clearly
           signal "click me to open a list". The chevron tells the user
           this is a dropdown, not a free-text field. */
        .picker-trigger {
            width: 100%;
            display: flex; align-items: center; justify-content: space-between;
            gap: 12px;
            padding: 11px 14px;
            background: var(--bg-input, var(--bg-raised));
            border: 1px solid var(--border-strong);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-family: inherit; font-size: 0.9rem;
            cursor: pointer;
            text-align: left;
            transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
        }
        .picker-trigger:hover  { border-color: var(--amber); }
        .picker-trigger:focus,
        .picker-trigger.open   { outline: none; border-color: var(--amber); box-shadow: 0 0 0 3px rgba(245,158,11,0.15); }
        .picker-trigger.has-selection {
            border-color: rgba(34,197,94,0.4);
            background: rgba(34,197,94,0.04);
        }

        .trigger-content { display: flex; flex-direction: column; gap: 2px; min-width: 0; flex: 1; }
        .trigger-city {
            font-size: 0.95rem; color: var(--text-primary);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .trigger-country {
            font-size: 0.7rem; color: var(--text-muted);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .trigger-placeholder { color: var(--text-muted); font-size: 0.9rem; font-style: italic; }
        .trigger-code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem; letter-spacing: 0.08em;
            color: var(--amber);
            padding: 3px 8px;
            background: rgba(245,158,11,0.1);
            border: 1px solid rgba(245,158,11,0.25);
            border-radius: 3px;
        }
        .trigger-chevron {
            width: 18px; height: 18px;
            display: flex; align-items: center; justify-content: center;
            color: var(--text-muted);
            transition: transform 0.2s, color 0.15s;
            flex-shrink: 0;
        }
        .picker-trigger.open .trigger-chevron { transform: rotate(180deg); color: var(--amber); }
        .picker-trigger:hover .trigger-chevron { color: var(--amber); }

        /* ── Popup ───────────────────────────────────────────────────── */
        .picker-popup {
            position: absolute; top: calc(100% + 4px); left: 0; right: 0;
            background: var(--bg-raised);
            border: 1px solid var(--border-strong);
            border-radius: var(--radius-md);
            box-shadow: 0 16px 48px rgba(0,0,0,0.5);
            overflow: hidden;
            z-index: 100;
            display: none;
        }
        .picker-popup.open {
            display: block;
            animation: popup-in 0.18s ease-out;
        }
        @keyframes popup-in {
            from { opacity: 0; transform: translateY(-6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Search bar — sticky at the top of the popup so it stays visible
           while the user scrolls a long port list. */
        .picker-search-wrap {
            position: sticky; top: 0;
            padding: 12px;
            background: var(--bg-raised);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 10px;
        }
        .picker-search-icon {
            color: var(--text-muted); font-size: 0.95rem; flex-shrink: 0;
        }
        .picker-search {
            flex: 1;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            padding: 8px 12px;
            font-size: 0.85rem; outline: none;
            transition: border-color 0.15s;
        }
        .picker-search:focus { border-color: var(--amber); }
        .picker-search::placeholder { color: var(--text-muted); font-style: italic; }
        .picker-count {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6rem; letter-spacing: 0.08em;
            color: var(--text-muted); flex-shrink: 0;
        }

        /* Region group headers inside the list */
        .picker-list { max-height: 360px; overflow-y: auto; }
        .picker-group-label {
            position: sticky; top: 0;
            background: var(--bg-surface);
            color: var(--text-muted);
            padding: 7px 14px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.55rem; letter-spacing: 0.16em;
            text-transform: uppercase;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }
        .picker-group-label:first-child { border-top: none; }

        .picker-option {
            padding: 10px 14px;
            display: flex; align-items: center; justify-content: space-between;
            gap: 12px;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            transition: background 0.12s;
        }
        .picker-option:last-child { border-bottom: none; }
        .picker-option:hover, .picker-option.highlighted {
            background: rgba(245,158,11,0.08);
        }
        .picker-option.selected {
            background: rgba(34,197,94,0.06);
            border-left: 3px solid #22c55e;
            padding-left: 11px;
        }
        .option-main { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
        .option-city {
            font-size: 0.9rem; color: var(--text-primary); font-weight: 500;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .option-country {
            font-size: 0.7rem; color: var(--text-muted);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .option-code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem; letter-spacing: 0.08em;
            color: var(--amber);
            padding: 3px 8px;
            background: rgba(245,158,11,0.08);
            border: 1px solid rgba(245,158,11,0.18);
            border-radius: 3px;
            flex-shrink: 0;
        }
        .picker-empty {
            padding: 24px 16px; text-align: center;
            color: var(--text-muted); font-size: 0.82rem;
            font-style: italic;
        }

        /* highlighted matched substring */
        .match { color: var(--amber); font-weight: 700; }

        /* clear button — appears once a port is selected */
        .picker-clear {
            position: absolute; top: 50%; right: 38px; transform: translateY(-50%);
            background: transparent; border: none; cursor: pointer;
            color: var(--text-muted); font-size: 1rem;
            display: none; padding: 4px 8px;
            border-radius: 3px; transition: background 0.15s, color 0.15s;
            z-index: 2;
        }
        .picker-trigger.has-selection ~ .picker-clear { display: block; }
        .picker-clear:hover { color: var(--red); background: rgba(239,68,68,0.1); }

        /* ── Route Preview ─────────────────────────────────────────────── */
        .route-preview {
            background: var(--bg-raised);
            border: 1px solid rgba(245,158,11,0.25);
            border-radius: var(--radius-md);
            padding: 18px 20px;
            margin: 24px 0;
            display: none;
        }
        .route-preview.visible { display: block; animation: route-in 0.4s ease-out; }
        @keyframes route-in {
            from { opacity: 0; transform: translateY(-6px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .route-preview-label {
            font-size: 0.6rem; letter-spacing: 0.14em;
            text-transform: uppercase; color: var(--text-muted);
            margin-bottom: 14px;
        }
        .route-line {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            gap: 16px;
        }
        .route-port { display: flex; flex-direction: column; gap: 4px; }
        .route-port.dest { text-align: right; }
        .route-port-city  { font-size: 1.05rem; font-weight: 600; color: var(--text-primary); }
        .route-port-country { font-size: 0.78rem; color: var(--text-secondary); }
        .route-port-code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem; letter-spacing: 0.1em;
            color: var(--amber); margin-top: 2px;
        }
        .route-arrow-big {
            color: var(--amber); font-size: 1.4rem;
            position: relative; padding: 0 4px;
        }
        .route-arrow-big::before {
            content: ''; position: absolute; top: 50%; left: -8px; right: -8px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--amber), transparent);
            transform: translateY(-50%);
        }

        .field-help {
            font-size: 0.7rem; color: var(--text-muted);
            margin-top: 5px; letter-spacing: 0.04em;
        }
        .field-help.error { color: var(--red); }

        .booking-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

        @media (max-width: 720px) {
            .booking-row { grid-template-columns: 1fr; }
            .route-line { grid-template-columns: 1fr; gap: 8px; }
            .route-port.dest { text-align: left; }
            .route-arrow-big { transform: rotate(90deg); }
            .route-arrow-big::before { display: none; }
        }
    </style>
</head>
<body>
<nav class="nav">
    <div class="nav-logo"><div class="nav-logo-hex"></div>CargoTrack</div>
    <div class="nav-links">

<main class="page">
    <div class="page-title">Book Shipment</div>
    <div class="page-subtitle">Pick the origin and destination ports — a confirmation email will be sent to your address.</div>

    <div id="alert-box"></div>

    <div class="card">
        <form id="booking-form">

            <div class="booking-row">
                <!-- ORIGIN -->
                <div class="form-group">
                    <label class="form-label">Origin Port</label>
                    <div class="port-picker" id="origin-picker">
                        <button type="button" class="picker-trigger" id="origin-trigger" aria-haspopup="listbox" aria-expanded="false">
                            <span class="trigger-content" id="origin-trigger-content">
                                <span class="trigger-placeholder">Choose a port…</span>
                            </span>
                            <span class="trigger-chevron" aria-hidden="true">▾</span>
                        </button>
                        <button type="button" class="picker-clear" id="origin-clear" aria-label="Clear origin">×</button>
                        <div class="picker-popup" id="origin-popup" role="listbox">
                            <div class="picker-search-wrap">
                                <span class="picker-search-icon">🔍</span>
                                <input type="text" class="picker-search" id="origin-search" placeholder="Search by city, country, or code…">
                                <span class="picker-count" id="origin-count">16</span>
                            </div>
                            <div class="picker-list" id="origin-list"></div>
                        </div>
                    </div>
                    <input type="hidden" id="origin-code">
                    <div class="field-help" id="origin-help">Click to browse the list of available ports.</div>
                </div>

                <!-- DESTINATION -->
                <div class="form-group">
                    <label class="form-label">Destination Port</label>
                    <div class="port-picker" id="destination-picker">
                        <button type="button" class="picker-trigger" id="destination-trigger" aria-haspopup="listbox" aria-expanded="false">
                            <span class="trigger-content" id="destination-trigger-content">
                                <span class="trigger-placeholder">Choose a port…</span>
                            </span>
                            <span class="trigger-chevron" aria-hidden="true">▾</span>
                        </button>
                        <button type="button" class="picker-clear" id="destination-clear" aria-label="Clear destination">×</button>
                        <div class="picker-popup" id="destination-popup" role="listbox">
                            <div class="picker-search-wrap">
                                <span class="picker-search-icon">🔍</span>
                                <input type="text" class="picker-search" id="destination-search" placeholder="Search by city, country, or code…">
                                <span class="picker-count" id="destination-count">16</span>
                            </div>
                            <div class="picker-list" id="destination-list"></div>
                        </div>
                    </div>
                    <input type="hidden" id="destination-code">
                    <div class="field-help" id="destination-help">Click to browse the list of available ports.</div>
                </div>
            </div>

            <!-- ROUTE PREVIEW -->
            <div id="route-preview" class="route-preview">
                <div class="route-preview-label">Route Preview</div>
                <div class="route-line">
                    <div class="route-port" id="preview-origin">
                        <div class="route-port-city"     id="preview-origin-city">—</div>
                        <div class="route-port-country"  id="preview-origin-country">—</div>
                        <div class="route-port-code"     id="preview-origin-code">—</div>
                    </div>
                    <div class="route-arrow-big">→</div>
                    <div class="route-port dest" id="preview-dest">
                        <div class="route-port-city"     id="preview-dest-city">—</div>
                        <div class="route-port-country"  id="preview-dest-country">—</div>
                        <div class="route-port-code"     id="preview-dest-code">—</div>
                    </div>
                </div>
            </div>

            <div class="booking-row">
                <div class="form-group">
                    <label class="form-label" for="description">Description</label>
                    <input id="description" class="form-control"
                           placeholder="e.g. Electronic components" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="weight">Weight (kg)</label>
                    <input id="weight" type="number" step="0.1" min="0.1" class="form-control"
                           placeholder="e.g. 250" required>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="eta">Expected Arrival</label>
                <input id="eta" type="date" class="form-control">
            </div>

            <button type="submit" class="btn btn-primary btn-lg" style="width:100%">
                Confirm Booking
            </button>
        </form>

<script type="module">
    import { Auth, CargoApi, LocationApi, initNav, showAlert } from '../js/api.js';

    Auth.requireAuth();
    initNav('book');

    /* ──────────────────────────────────────────────────────────────
       Port picker — "select with search" component.

       Pattern: clicking the trigger opens a popup that contains its own
       search input plus the list of all ports. Filtering happens
       client-side because /api/locations returns ~16 rows that all fit
       in memory comfortably.

       Why a separate trigger button rather than the previous combobox:
       a button with a chevron is universally recognised as "opens a
       list", whereas the previous styling looked like a free-text
       field. Visual clarity beats elegance for first-time users.
       ────────────────────────────────────────────────────────────── */

    let LOCATIONS = [];                                 // populated on load
    const SELECTED = { origin: null, destination: null };

    /** Map UN/LOCODE country prefix → user-facing region label. Used to
     *  group the dropdown so users can browse by continent at a glance. */
    const REGION_BY_CC = {
        ZA: 'Africa',
        US: 'Americas', CA: 'Americas', BR: 'Americas',
        NL: 'Europe', DE: 'Europe', GB: 'Europe', ES: 'Europe', FR: 'Europe', IT: 'Europe',
        CN: 'Asia', HK: 'Asia', SG: 'Asia', JP: 'Asia', KR: 'Asia', IN: 'Asia',
        AE: 'Middle East', SA: 'Middle East',
        AU: 'Oceania', NZ: 'Oceania'
    };
    const REGION_ORDER = ['Africa', 'Americas', 'Europe', 'Middle East', 'Asia', 'Oceania', 'Other'];

    function regionOf(loc) {
        const cc = (loc.unlocode || '').slice(0, 2).toUpperCase();
        return REGION_BY_CC[cc] || 'Other';
    }

    async function loadLocations() {
        try {
            LOCATIONS = await LocationApi.list();
            LOCATIONS.sort((a, b) => a.city.localeCompare(b.city));
        } catch (err) {
            console.error('Failed to load locations:', err);
            showAlert('alert-box',
                'Could not load the port catalogue. Refresh or contact an admin.', 'error');
        }
    }

    /* ── Per-picker state and wiring ─────────────────────────────────── */

    function setupPicker(field) {
        const trigger      = document.getElementById(`${field}-trigger`);
        const triggerInner = document.getElementById(`${field}-trigger-content`);
        const popup        = document.getElementById(`${field}-popup`);
        const search       = document.getElementById(`${field}-search`);
        const list         = document.getElementById(`${field}-list`);
        const countEl      = document.getElementById(`${field}-count`);
        const codeHidden   = document.getElementById(`${field}-code`);
        const help         = document.getElementById(`${field}-help`);
        const clearBtn     = document.getElementById(`${field}-clear`);

        let highlightedIdx = -1;

        function renderList(query) {
            const q = (query || '').trim().toLowerCase();
            const matches = q
                ? LOCATIONS.filter(l =>
                    l.city.toLowerCase().includes(q)    ||
                    l.country.toLowerCase().includes(q) ||
                    l.unlocode.toLowerCase().includes(q))
                : LOCATIONS.slice();

            countEl.textContent = matches.length;
            list.innerHTML = '';
            highlightedIdx = -1;

            if (!matches.length) {
                const empty = document.createElement('div');
                empty.className = 'picker-empty';
                empty.textContent = `No ports match "${query}".`;
                list.appendChild(empty);
                return;
            }

            // Group by region — but flatten back out when the user is
            // searching, since group headers add visual noise to a short
            // filtered list.
            if (!q) {
                const byRegion = {};
                matches.forEach(loc => {
                    const r = regionOf(loc);
                    (byRegion[r] = byRegion[r] || []).push(loc);
                });
                REGION_ORDER.forEach(region => {
                    const ports = byRegion[region];
                    if (!ports || !ports.length) return;
                    const header = document.createElement('div');
                    header.className = 'picker-group-label';
                    header.textContent = `// ${region}`;
                    list.appendChild(header);
                    ports.forEach(loc => list.appendChild(buildOption(loc, q)));
                });
            } else {
                matches.forEach(loc => list.appendChild(buildOption(loc, q)));
            }
        }

        function buildOption(loc, query) {
            const opt = document.createElement('div');
            opt.className = 'picker-option';
            opt.dataset.unlocode = loc.unlocode;
            opt.setAttribute('role', 'option');
            if (SELECTED[field]?.unlocode === loc.unlocode) opt.classList.add('selected');

            opt.innerHTML = `
                <div class="option-main">
                    <span class="option-city">${highlight(loc.city, query)}</span>
                    <span class="option-country">${highlight(loc.country, query)}</span>
                </div>
                <span class="option-code">${highlight(loc.unlocode, query)}</span>
            `;
            opt.addEventListener('mousedown', e => { e.preventDefault(); select(loc); });
            opt.addEventListener('mouseenter', () => {
                list.querySelectorAll('.highlighted').forEach(el => el.classList.remove('highlighted'));
                opt.classList.add('highlighted');
            });
            return opt;
        }

        function open() {
            renderList(search.value);
            popup.classList.add('open');
            trigger.classList.add('open');
            trigger.setAttribute('aria-expanded', 'true');
            // Focus the search input after the popup paints — feels snappier.
            setTimeout(() => search.focus(), 30);
        }
        function close() {
            popup.classList.remove('open');
            trigger.classList.remove('open');
            trigger.setAttribute('aria-expanded', 'false');
        }
        function toggle() { popup.classList.contains('open') ? close() : open(); }

        function select(loc) {
            SELECTED[field] = loc;
            triggerInner.innerHTML = `
                <span class="trigger-city">${escapeHtml(loc.city)}</span>
                <span class="trigger-country">${escapeHtml(loc.country)}</span>
            `;
            trigger.classList.add('has-selection');
            codeHidden.value = loc.unlocode;
            help.textContent = `Selected: ${loc.unlocode}`;
            help.classList.remove('error');
            close();
            search.value = '';
            updateRoutePreview();
            validateNotSameAsOther(field);
        }

        function clear() {
            SELECTED[field] = null;
            triggerInner.innerHTML = `<span class="trigger-placeholder">Choose a port…</span>`;
            trigger.classList.remove('has-selection');
            codeHidden.value = '';
            help.textContent = 'Click to browse the list of available ports.';
            help.classList.remove('error');
            updateRoutePreview();
            search.value = '';
            trigger.focus();
        }

        // Trigger button
        trigger.addEventListener('click', toggle);
        trigger.addEventListener('keydown', e => {
            if (e.key === 'Enter' || e.key === ' ' || e.key === 'ArrowDown') {
                e.preventDefault(); open();
            }
        });

        // Clear button
        clearBtn.addEventListener('click', e => { e.stopPropagation(); clear(); });

        // Search-as-you-type inside the popup
        search.addEventListener('input', () => renderList(search.value));
        search.addEventListener('keydown', e => {
            const opts = [...list.querySelectorAll('.picker-option')];
            if (e.key === 'ArrowDown') {
                e.preventDefault();
                highlightedIdx = Math.min(opts.length - 1, highlightedIdx + 1);
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                highlightedIdx = Math.max(0, highlightedIdx - 1);
            } else if (e.key === 'Enter') {
                if (highlightedIdx >= 0 && opts[highlightedIdx]) {
                    e.preventDefault();
                    const code = opts[highlightedIdx].dataset.unlocode;
                    const loc = LOCATIONS.find(l => l.unlocode === code);
                    if (loc) select(loc);
                }
                return;
            } else if (e.key === 'Escape') {
                e.preventDefault(); close(); trigger.focus(); return;
            } else {
                return;
            }
            opts.forEach(o => o.classList.remove('highlighted'));
            opts[highlightedIdx]?.classList.add('highlighted');
            opts[highlightedIdx]?.scrollIntoView({ block: 'nearest' });
        });

        // Click-outside-to-close. Each picker checks its OWN container so
        // they don't fight each other.
        document.addEventListener('mousedown', e => {
            if (popup.classList.contains('open')
                && !popup.contains(e.target)
                && !trigger.contains(e.target)
                && !clearBtn.contains(e.target)) {
                close();
            }
        });
    }

    function highlight(text, query) {
        if (!query) return escapeHtml(text);
        const safe   = escapeHtml(text);
        const needle = escapeRegex(query);
        return safe.replace(new RegExp(`(${needle})`, 'ig'), '<span class="match">$1</span>');
    }
    function escapeHtml(s)  { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
    function escapeRegex(s) { return String(s).replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

    function validateNotSameAsOther(justChanged) {
        const o = SELECTED.origin?.unlocode;
        const d = SELECTED.destination?.unlocode;
        if (o && d && o === d) {
            const help = document.getElementById(`${justChanged}-help`);
            help.textContent = '✗ Origin and destination cannot be the same port.';
            help.classList.add('error');
        }
    }

    function updateRoutePreview() {
        const preview = document.getElementById('route-preview');
        const o = SELECTED.origin;
        const d = SELECTED.destination;
        if (o && d) {
            document.getElementById('preview-origin-city').textContent    = o.city;
            document.getElementById('preview-origin-country').textContent = o.country;
            document.getElementById('preview-origin-code').textContent    = o.unlocode;
            document.getElementById('preview-dest-city').textContent      = d.city;
            document.getElementById('preview-dest-country').textContent   = d.country;
            document.getElementById('preview-dest-code').textContent      = d.unlocode;
            preview.classList.add('visible');
        } else {
            preview.classList.remove('visible');
        }
    }

    /* ── Bootstrap ──────────────────────────────────────────────────── */
    await loadLocations();
    setupPicker('origin');
    setupPicker('destination');

    /* Default the ETA picker to "tomorrow" — friendlier than blank. */
    const tomorrow = new Date(Date.now() + 24 * 3600 * 1000);
    document.getElementById('eta').value = tomorrow.toISOString().slice(0, 10);
    document.getElementById('eta').min   = tomorrow.toISOString().slice(0, 10);

    /* ── Form submission ──────────────────────────────────────────────── */
    document.getElementById('booking-form').addEventListener('submit', async (e) => {
        e.preventDefault();

        if (!SELECTED.origin || !SELECTED.destination) {
            showAlert('alert-box', 'Please pick both an origin and a destination port.', 'error');
            return;
        }
        if (SELECTED.origin.unlocode === SELECTED.destination.unlocode) {
            showAlert('alert-box', 'Origin and destination cannot be the same port.', 'error');
            return;
        }

        const btn = e.target.querySelector('button[type="submit"]');
        btn.disabled    = true;
        btn.textContent = 'Booking…';

        try {
            const result = await CargoApi.book({
                originUnlocode:      SELECTED.origin.unlocode,
                destinationUnlocode: SELECTED.destination.unlocode,
                description:         document.getElementById('description').value.trim(),
                weightKg:            parseFloat(document.getElementById('weight').value),
                expectedArrival:     document.getElementById('eta').value || null
            });

            const originLabel = `${SELECTED.origin.city}, ${SELECTED.origin.country}`;
            const destLabel   = `${SELECTED.destination.city}, ${SELECTED.destination.country}`;

            showAlert(
                'alert-box',
                `✓ Booking confirmed! Tracking: ${result.trackingNumber} — ` +
                `${originLabel} → ${destLabel}. A confirmation email has been sent to you.`,
                'success'
            );

            document.getElementById('booking-form').reset();
            ['origin', 'destination'].forEach(f => {
                SELECTED[f] = null;
                document.getElementById(`${f}-trigger-content`).innerHTML =
                    `<span class="trigger-placeholder">Choose a port…</span>`;
                document.getElementById(`${f}-trigger`).classList.remove('has-selection');
                document.getElementById(`${f}-code`).value = '';
                document.getElementById(`${f}-help`).textContent =
                    'Click to browse the list of available ports.';
                document.getElementById(`${f}-help`).classList.remove('error');
            });
            updateRoutePreview();
            document.getElementById('eta').value = tomorrow.toISOString().slice(0, 10);
        } catch (err) {
            showAlert('alert-box', err.message || 'Booking failed. Please try again.', 'error');
        } finally {
            btn.disabled    = false;
            btn.textContent = 'Confirm Booking';
        }
    });
</script>
</body>
</html>
